; =====================================================================
;  platformio.ini  -  AquaController (ESP32-C3)
;  arduino-esp32 3.x (新 LEDC API / ArduinoJson 7) を前提。
;  公式 espressif32 はコア 2.x 停滞のため pioarduino プラットフォームを使用。
;  ※ コア 2.x を使う場合: leds.cpp/fan.cpp の ledcAttach→ledcSetup+ledcAttachPin、
;    ArduinoJson を v6 系へ調整し、ESPAsyncWebServer を esphome 版に差替え。
; =====================================================================
[env:esp32-c3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = esp32-c3-devkitm-1
framework = arduino

monitor_speed = 115200
upload_speed = 921600
upload_port = COM7
monitor_port = COM7

board_build.filesystem = littlefs
board_build.partitions = partitions.csv

build_flags =
  -D CORE_DEBUG_LEVEL=2
  -D CONFIG_ARDUHAL_LOG_COLORS=1

lib_deps =
  bblanchon/ArduinoJson @ ^7.0.4
  mathieucarbou/ESPAsyncWebServer @ ^3.3.12     ; AsyncTCP / AsyncJson 同梱・v7 対応
  adafruit/Adafruit NeoPixel @ ^1.12.3          ; WS2812 / SK6812 RGBW
  olikraus/U8g2 @ ^2.35.30                       ; SSD1306 72x40 OLED (SuperMini)
  paulstoffregen/OneWire @ ^2.3.8
  milesburton/DallasTemperature @ ^4.0.1
  adafruit/Adafruit BME280 Library @ ^2.2.4
  adafruit/Adafruit BMP280 Library @ ^2.6.8
  adafruit/Adafruit Unified Sensor @ ^1.1.14
