<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AquaController オフラインビューアー</title>
<!--
  完全スタンドアロン・オフラインツール（サーバ/CDN/ネット不要。ダブルクリックで開く）。
  実機の Web UI から WiFi 経由でダウンロードした JSON を読み込んで閲覧・管理します。
  ★ USB でターゲット(5V/AC 高電圧側)に PC を繋がずにデータ管理できる = PC の安全保護。
  対応: settings.json / presets.json / calib.json（DLラッパ {savedAt,calib} 可）/ wifi.ini。
-->
<style>
  :root{--bg:#0f1523;--card:#182236;--ink:#e8eefc;--sub:#8fa3c8;--line:#28344f;--accent:#4aa8ff;}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink);}
  header{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  header h1{font-size:1.05rem;margin:0}
  header .sub{color:var(--sub);font-size:.82rem}
  main{padding:16px;max-width:1000px;margin:0 auto}
  #drop{border:2px dashed var(--line);border-radius:12px;padding:26px;text-align:center;color:var(--sub);
        cursor:pointer;transition:.15s;margin-bottom:16px}
  #drop.over{border-color:var(--accent);color:var(--ink);background:#16203a}
  input[type=file]{display:none}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin:0 0 16px}
  .card h2{margin:0 0 10px;font-size:.98rem}
  .card h2 .tag{font-size:.72rem;color:var(--sub);font-weight:400;margin-left:8px}
  table{width:100%;border-collapse:collapse;font-size:.86rem}
  td,th{padding:5px 8px;border-bottom:1px solid var(--line);text-align:left}
  th{color:var(--sub);font-weight:600}
  .num{font-variant-numeric:tabular-nums;text-align:right}
  canvas{width:100%;height:150px;background:#0c1220;border:1px solid var(--line);border-radius:8px;display:block}
  .preset{border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin:8px 0}
  .preset .nm{font-weight:600;margin-bottom:6px}
  .muted{color:var(--sub);font-size:.82rem}
  .kv{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--line)}
  .kv .k{color:var(--sub)}
  .err{color:#ff8a8a}
  .legend{display:flex;gap:12px;font-size:.78rem;color:var(--sub);margin:6px 0 2px;flex-wrap:wrap}
  .legend b{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px;vertical-align:middle}
</style>
</head>
<body>
<header>
  <h1>≈ AquaController オフラインビューアー</h1>
  <span class="sub">実機不要・オフライン。WiFiで落とした JSON を読み込みます（PCを高電圧側にUSB接続しないための切り離し）。</span>
</header>
<main>
  <div id="drop">ここに <b>ファイル</b> をドラッグ&ドロップ、またはクリックして選択<br>
    <span class="muted">settings.json / presets.json / calib.json / 履歴(/api/histdb).json / histA.tsdb・histB.tsdb（複数可）</span></div>
  <input type="file" id="file" accept=".json,application/json,.tsdb" multiple>
  <div id="out"></div>
</main>
<script>
"use strict";
const $ = s => document.querySelector(s);
const out = $("#out"), drop = $("#drop"), file = $("#file");

drop.addEventListener("click", () => file.click());
file.addEventListener("change", e => handle(e.target.files));
["dragenter","dragover"].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add("over"); }));
["dragleave","drop"].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove("over"); }));
drop.addEventListener("drop", e => handle(e.dataTransfer.files));

function handle(files) {
  [...files].forEach(f => {
    const r = new FileReader();
    if (/\.tsdb$/i.test(f.name)) {                 // 生 TSDB バイナリ (17B レコード)
      r.onload = () => renderTSDB(f.name, r.result);
      r.readAsArrayBuffer(f);
    } else {
      r.onload = () => {
        let obj;
        try { obj = JSON.parse(r.result); }
        catch (err) { return addCard(f.name, "エラー", `<div class="err">JSON パース失敗: ${err}</div>`); }
        render(f.name, obj);
      };
      r.readAsText(f);
    }
  });
}

function addCard(title, tag, html) {
  const c = document.createElement("section");
  c.className = "card";
  c.innerHTML = `<h2>${esc(title)}<span class="tag">${tag||""}</span></h2>${html}`;
  out.prepend(c);
  return c;
}
function esc(s){ return String(s).replace(/[&<>]/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[m])); }
function fmt(v, d){ return v==null||isNaN(v) ? "-" : (v>=0&&d==="off"?"+":"") + Number(v).toFixed(d==="off"?3:2); }

// ---- 種別判定（順序が重要: 履歴rows→settings→presets→calib）----
function render(name, obj) {
  const cal = (obj.calib && typeof obj.calib === "object") ? obj.calib : obj;  // DLラッパ {savedAt,calib}
  if (Array.isArray(obj.rows))             return renderHistory(name,          // /api/histdb の rows[[epoch,water,air,humid,press,rpm],...]
    obj.rows.map(a => ({ epoch: a[0], water: a[1], air: a[2], humid: a[3], press: a[4], rpm: a[5] })));
  if (obj.light || obj.heater || obj.safe) return renderSettings(name, obj);   // settings.json
  if (obj.led || obj.fan)                  return renderPresets(name, obj);    // presets.json
  if (["water","air","humid","press"].some(k => k in cal)) return renderCalib(name, cal, obj.savedAt);
  addCard(name, "不明", `<div class="muted">対応形式を判別できませんでした。</div><pre class="muted" style="white-space:pre-wrap">${esc(JSON.stringify(obj,null,2)).slice(0,2000)}</pre>`);
}

// ---- 校正 ----
function renderCalib(name, c, savedAt) {
  const rows = [["水温 water", c.water, null],["気温 air", c.air, c.diffAir],
                ["湿度 humid", c.humid, c.diffHumid],["気圧 press", c.press, null]];
  let h = `<table><tr><th>項目</th><th class="num">適用オフセット</th><th class="num">ライブ差分(基準-作業)</th></tr>`;
  rows.forEach(r => h += `<tr><td>${r[0]}</td><td class="num">${fmt(r[1],"off")}</td><td class="num">${r[2]==null?"-":fmt(r[2],"off")}</td></tr>`);
  h += `</table>`;
  if (savedAt) h += `<div class="muted" style="margin-top:8px">保存時刻: ${esc(savedAt)}</div>`;
  addCard(name, "校正 calib", h);
}

// ---- 設定 (settings.json) ----
function renderSettings(name, s) {
  const c = addCard(name, "設定 settings", "");
  const body = document.createElement("div");
  if (s.light) {
    body.innerHTML += `<div class="muted">ライト 24時間スケジュール (0-1440分 / 0-100%)</div>
      <div class="legend"><span><b style="background:#ff6b6b"></b>R</span><span><b style="background:#51e08a"></b>G</span>
      <span><b style="background:#4aa8ff"></b>B</span><span><b style="background:#dfefff"></b>W</span></div>`;
    const cv = document.createElement("canvas"); body.appendChild(cv);
    setTimeout(() => drawCurve(cv, [
      {pts:s.light.r,color:"#ff6b6b"},{pts:s.light.g,color:"#51e08a"},
      {pts:s.light.b,color:"#4aa8ff"},{pts:s.light.w,color:"#dfefff"}], 0, 1440, 100), 0);
  }
  if (s.fan && s.fan.points) {
    const d = document.createElement("div"); d.className="muted"; d.style.marginTop="12px"; d.textContent="ファン カーブ (22-35°C / 0-100%)";
    body.appendChild(d);
    const cv = document.createElement("canvas"); body.appendChild(cv);
    setTimeout(() => drawCurve(cv, [{pts:s.fan.points,color:"#37e0b0"}], 22, 35, 100), 0);
  }
  let kv = "";
  if (s.heater) kv += `<div class="kv"><span class="k">ヒーター目標</span><span>${fmt(s.heater.target)} °C（ヒス ${fmt(s.heater.hyst)}）</span></div>`;
  if (s.safe)   kv += `<div class="kv"><span class="k">安全域</span><span>${fmt(s.safe.lo)} – ${fmt(s.safe.hi)} °C</span></div>`;
  if (kv) { const k=document.createElement("div"); k.style.marginTop="12px"; k.innerHTML=kv; body.appendChild(k); }
  c.appendChild(body);
}

// ---- プリセット (presets.json) ----
function renderPresets(name, p) {
  const c = addCard(name, "プリセット presets", "");
  const box = document.createElement("div");
  const led = p.led || {}, fan = p.fan || {};
  box.innerHTML += `<div class="muted">LED プリセット: ${Object.keys(led).length} 件 / ファン プリセット: ${Object.keys(fan).length} 件</div>`;
  Object.keys(led).forEach(nm => {
    const d = document.createElement("div"); d.className="preset";
    d.innerHTML = `<div class="nm">💡 ${esc(nm)}</div>`;
    const cv = document.createElement("canvas"); cv.style.height="110px"; d.appendChild(cv); box.appendChild(d);
    const L = led[nm];
    setTimeout(() => drawCurve(cv, [
      {pts:L.r,color:"#ff6b6b"},{pts:L.g,color:"#51e08a"},{pts:L.b,color:"#4aa8ff"},{pts:L.w,color:"#dfefff"}], 0, 1440, 100), 0);
  });
  Object.keys(fan).forEach(nm => {
    const d = document.createElement("div"); d.className="preset";
    d.innerHTML = `<div class="nm">🌀 ${esc(nm)}</div>`;
    const cv = document.createElement("canvas"); cv.style.height="110px"; d.appendChild(cv); box.appendChild(d);
    setTimeout(() => drawCurve(cv, [{pts:fan[nm].points,color:"#37e0b0"}], 22, 35, 100), 0);
  });
  c.appendChild(box);
}

// ---- カーブ描画 (線形補間 + 制御点。値の管理用に素直な表示) ----
function drawCurve(cv, tracks, xmin, xmax, ymax) {
  const dpr = window.devicePixelRatio || 1;
  const w = cv.clientWidth, h = cv.clientHeight;
  cv.width = w*dpr; cv.height = h*dpr;
  const g = cv.getContext("2d"); g.scale(dpr,dpr);
  g.clearRect(0,0,w,h);
  const pad = {l:34,r:8,t:8,b:18};
  const X = x => pad.l + (x-xmin)/(xmax-xmin)*(w-pad.l-pad.r);
  const Y = y => pad.t + (1-y/ymax)*(h-pad.t-pad.b);
  // grid
  g.strokeStyle="#28344f"; g.fillStyle="#8fa3c8"; g.font="10px system-ui"; g.lineWidth=1;
  for(let i=0;i<=4;i++){ const yy=pad.t+i/4*(h-pad.t-pad.b); g.beginPath(); g.moveTo(pad.l,yy); g.lineTo(w-pad.r,yy); g.stroke();
    g.fillText(Math.round(ymax*(1-i/4)), 4, yy+3); }
  // x labels
  const isTime = xmax>100;
  for(let i=0;i<=4;i++){ const xv=xmin+i/4*(xmax-xmin); const xx=X(xv);
    const lab = isTime ? String(Math.round(xv/60)).padStart(2,"0")+"h" : xv.toFixed(0)+"°";
    g.fillText(lab, xx-8, h-5); }
  tracks.forEach(t => {
    const pts = (t.pts||[]).slice().sort((a,b)=>a.x-b.x);
    if(!pts.length) return;
    g.strokeStyle=t.color; g.lineWidth=1.8; g.beginPath();
    pts.forEach((p,i)=> i?g.lineTo(X(p.x),Y(p.y)):g.moveTo(X(p.x),Y(p.y)));
    g.stroke();
    g.fillStyle=t.color;
    pts.forEach(p=>{ g.beginPath(); g.arc(X(p.x),Y(p.y),2.2,0,7); g.fill(); });
  });
}

// ---- 履歴 TSDB ----
// CRC16-CCITT (0x1021, init 0xFFFF) — histdb.cpp と一致。
function crc16(bytes){
  let c=0xFFFF;
  for(let i=0;i<bytes.length;i++){ c^=bytes[i]<<8; for(let k=0;k<8;k++) c=(c&0x8000)?((c<<1)^0x1021)&0xFFFF:(c<<1)&0xFFFF; }
  return c&0xFFFF;
}
// 生 .tsdb バイナリ (17B/レコード, little-endian) をデコード。CRC 不一致は除外。
function parseTSDB(buf){
  const dv=new DataView(buf), REC=17, rows=[]; let bad=0;
  for(let o=0;o+REC<=buf.byteLength;o+=REC){
    const crc=dv.getUint16(o+15,true);
    if(crc16(new Uint8Array(buf,o,15))!==crc){ bad++; continue; }   // 破損除外
    rows.push({
      epoch: dv.getUint32(o,true),
      water: dv.getInt16(o+4,true)/100, air: dv.getInt16(o+6,true)/100,
      humid: dv.getInt16(o+8,true)/100, press: 1000+dv.getInt16(o+10,true)/100,
      rpm: dv.getInt16(o+12,true), fanOn: dv.getUint8(o+14)
    });
  }
  rows._bad=bad; return rows;
}
function renderTSDB(name, buf){
  const rows=parseTSDB(buf);
  renderHistory(name+" (TSDB生データ, "+Math.floor(buf.byteLength/17)+"件"+(rows._bad?`, CRC除外${rows._bad}`:"")+")", rows);
}
// 履歴 rows [{epoch,water,air,humid,press,rpm}] を統計+時系列グラフで表示。
function renderHistory(name, rows){
  rows=(rows||[]).filter(r=>r&&r.epoch).sort((a,b)=>a.epoch-b.epoch);
  const c=addCard(name, "履歴 history ("+rows.length+"点)", "");
  const box=document.createElement("div");
  if(rows.length){
    const a=rows[0].epoch, b=rows[rows.length-1].epoch, fd=e=>new Date(e*1000).toLocaleString();
    const avg=k=>(rows.reduce((s,r)=>s+r[k],0)/rows.length);
    box.innerHTML += `<div class="muted">期間: ${fd(a)} 〜 ${fd(b)}　平均 水温${avg("water").toFixed(2)}℃ / 気温${avg("air").toFixed(2)}℃ / 湿度${avg("humid").toFixed(1)}% / 気圧${avg("press").toFixed(1)}hPa</div>
      <div class="legend"><span><b style="background:#3ec6ff"></b>水温</span><span><b style="background:#7CFFB2"></b>気温</span>
      <span><b style="background:#5fd0e0"></b>湿度</span><span><b style="background:#c89bff"></b>気圧(右軸)</span></div>`;
    const cv=document.createElement("canvas"); box.appendChild(cv);
    setTimeout(()=>drawTimeSeries(cv,rows),0);
  } else box.innerHTML = `<div class="muted">有効なレコードがありません（CRC不一致で除外の可能性）。</div>`;
  c.appendChild(box);
}
// 時系列: X=epoch, 左Y=水温/気温/湿度(自動レンジ), 右Y=気圧(自動レンジ)。
function drawTimeSeries(cv, rows){
  const dpr=window.devicePixelRatio||1, w=cv.clientWidth, h=cv.clientHeight;
  cv.width=w*dpr; cv.height=h*dpr; const g=cv.getContext("2d"); g.scale(dpr,dpr); g.clearRect(0,0,w,h);
  if(!rows.length) return;
  const pad={l:38,r:46,t:8,b:20};
  const t0=rows[0].epoch, t1=rows[rows.length-1].epoch, tr=(t1-t0)||1;
  let lo=Infinity,hi=-Infinity; rows.forEach(r=>[r.water,r.air,r.humid].forEach(v=>{if(v<lo)lo=v;if(v>hi)hi=v;}));
  if(lo===hi){lo-=1;hi+=1;} const lp=(hi-lo)*0.1; lo-=lp; hi+=lp;
  let plo=Infinity,phi=-Infinity; rows.forEach(r=>{if(r.press<plo)plo=r.press;if(r.press>phi)phi=r.press;});
  if(plo===phi){plo-=1;phi+=1;} const pp=(phi-plo)*0.1; plo-=pp; phi+=pp;
  const X=t=>pad.l+(t-t0)/tr*(w-pad.l-pad.r);
  const YL=v=>pad.t+(1-(v-lo)/(hi-lo))*(h-pad.t-pad.b);
  const YR=v=>pad.t+(1-(v-plo)/(phi-plo))*(h-pad.t-pad.b);
  g.strokeStyle="#28344f"; g.fillStyle="#8fa3c8"; g.font="10px system-ui"; g.lineWidth=1;
  for(let i=0;i<=4;i++){ const yy=pad.t+i/4*(h-pad.t-pad.b); g.beginPath(); g.moveTo(pad.l,yy); g.lineTo(w-pad.r,yy); g.stroke();
    g.fillText((hi-(hi-lo)*i/4).toFixed(1),2,yy+3); g.fillText((phi-(phi-plo)*i/4).toFixed(0),w-pad.r+3,yy+3); }
  const pz=n=>String(n).padStart(2,"0");
  for(let i=0;i<=4;i++){ const tt=t0+tr*i/4, d=new Date(tt*1000); g.fillText(pz(d.getMonth()+1)+"/"+pz(d.getDate())+" "+pz(d.getHours())+":"+pz(d.getMinutes()), X(tt)-24, h-5); }
  const line=(k,color,yf)=>{ g.strokeStyle=color; g.lineWidth=1.5; g.beginPath();
    rows.forEach((r,i)=> i?g.lineTo(X(r.epoch),yf(r[k])):g.moveTo(X(r.epoch),yf(r[k]))); g.stroke(); };
  line("water","#3ec6ff",YL); line("air","#7CFFB2",YL); line("humid","#5fd0e0",YL); line("press","#c89bff",YR);
}
</script>
</body>
</html>
